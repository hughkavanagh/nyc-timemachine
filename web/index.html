<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>1940s Lens</title>
  <!-- MapLibre GL JS for the rotating minimap. Loaded from unpkg CDN; no
       API key needed. Paired with OpenFreeMap's free dark tile style. -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: rgba(255,255,255,0.7);
      --bubble: rgba(0,0,0,0.5);
      --bubble-border: rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; }
    /* ID selectors below use display:flex/grid which would beat the UA
       `[hidden]{display:none}` rule — override explicitly so `hidden`
       attribute wins. */
    [hidden] { display: none !important; }
    html, body {
      margin: 0; padding: 0; background: var(--bg); color: var(--fg);
      font-family: -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }

    /* ---------- Photo carousel ----------
       The "pane" is a stack of .slide elements. At any time one is the
       focal photo (slot-center) and the ones to either side are peeks of
       the neighboring buildings by bearing (slot-left / slot-right).
       As the user turns and the trio shifts, role classes swap and CSS
       transitions do the smooth slide. Entering slides start "far-" so
       they fly in from outside the viewport. */
    #photoWrap {
      position: relative;
      width: 100vw;
      min-height: 100dvh;
      overflow: hidden;
      background: #000;
    }
    #photoWrap.empty { min-height: 100dvh; }

    .slide {
      position: absolute;
      top: 0; left: 0;
      width: 100vw;
      /* Transform origin = top center keeps the image pinned to the top
         of the viewport as it scales down on the sides, matching the
         main photo which is top-aligned. */
      transform-origin: 50% 0;
      transition:
        transform 360ms cubic-bezier(.33, .0, .2, 1),
        filter    360ms linear,
        opacity   320ms linear;
      will-change: transform, filter, opacity;
    }
    .slide a { position: relative; display: block; width: 100%; }
    .slide img { width: 100vw; height: auto; display: block; }

    /* Peek roles: dimmed to ~20% (≈ 80% black overlay) + subtle blur. */
    .slide.slot-left {
      transform: translateX(-58%) scale(0.72);
      filter: brightness(0.22) blur(3px);
      opacity: 1;
      z-index: 1;
      pointer-events: none;
    }
    .slide.slot-center {
      transform: translateX(0) scale(1);
      filter: none;
      opacity: 1;
      z-index: 3;
      pointer-events: auto;
    }
    .slide.slot-right {
      transform: translateX(58%) scale(0.72);
      filter: brightness(0.22) blur(3px);
      opacity: 1;
      z-index: 1;
      pointer-events: none;
    }
    /* Entry states — slides start offscreen and animate to their role. */
    .slide.slot-far-left {
      transform: translateX(-130%) scale(0.6);
      filter: brightness(0.1) blur(6px);
      opacity: 0;
      z-index: 0;
    }
    .slide.slot-far-right {
      transform: translateX(130%) scale(0.6);
      filter: brightness(0.1) blur(6px);
      opacity: 0;
      z-index: 0;
    }
    /* Exit state — slide fades/shrinks out in place before being removed. */
    .slide.slot-exit {
      opacity: 0;
      transform: scale(0.55);
      filter: brightness(0.1) blur(6px);
      z-index: 0;
    }

    /* Shimmer overlay shown while full-res is loading behind a thumbnail. */
    .shimmer {
      position: absolute; inset: 0;
      background: linear-gradient(100deg,
        rgba(255,255,255,0)    0%,
        rgba(255,255,255,0.08) 45%,
        rgba(255,255,255,0.18) 50%,
        rgba(255,255,255,0.08) 55%,
        rgba(255,255,255,0)   100%);
      background-size: 250% 100%;
      animation: shimmer 1.4s linear infinite;
      pointer-events: none;
      mix-blend-mode: overlay;
      opacity: 1;
      transition: opacity 220ms ease;
    }
    .shimmer.fade-out { opacity: 0; }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Portrait-only: if the device is in landscape (small height),
       hide the main UI and ask them to rotate. */
    #rotateHint {
      display: none;
      position: fixed; inset: 0;
      align-items: center; justify-content: center; flex-direction: column;
      gap: 10px;
      background: rgba(0,0,0,0.92);
      color: var(--fg); text-align: center; padding: 20px;
      z-index: 100;
    }
    #rotateHint svg { width: 48px; height: 48px; opacity: 0.8; }
    #rotateHint p { margin: 0; font-size: 1rem; }
    @media (max-height: 480px) and (orientation: landscape) {
      #rotateHint { display: flex; }
      #topPill, #bottomCard, #centerBtn, #photoWrap, #desktopCtrl,
      #miniMap, #emptyHint { visibility: hidden; }
    }

    /* ---------- Shared bubble style ---------- */
    .bubble {
      background: var(--bubble);
      border: 1px solid var(--bubble-border);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      color: var(--fg);
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }

    /* ---------- Top pill: just the title, top-left ----------
       Compass was removed here — the minimap now carries all the
       orientation feedback, so the title pill is just an identity
       marker. Left-aligned to balance the minimap on the right. */
    #topPill {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0) + 14px);
      left: 14px;
      display: flex; align-items: center;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.95rem;
      z-index: 20;
    }
    #topPill .title { font-weight: 600; letter-spacing: 0.3px; }

    /* ---------- Bottom card: address + alts ---------- */
    #bottomCard {
      position: fixed;
      left: 50px; right: 50px;
      bottom: calc(env(safe-area-inset-bottom, 0) + 20px);
      padding: 16px 20px;
      border-radius: 18px;
      z-index: 20;
    }
    #bottomCard .cardHead {
      display: flex; align-items: center; gap: 10px;
    }
    #bottomCard .addr {
      margin: 0; font-size: 1.1rem; font-weight: 600;
      line-height: 1.25; letter-spacing: 0.2px;
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #bottomCard .cardActions {
      display: flex; gap: 4px; align-items: center;
      flex: 0 0 auto;
    }
    #bottomCard .iconBtn {
      width: 28px; height: 28px; padding: 0; border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--fg);
      font-size: 0.85rem; font-weight: 600;
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 120ms linear, transform 160ms ease;
    }
    #bottomCard .iconBtn:hover { background: rgba(255,255,255,0.18); }
    #bottomCard .iconBtn svg {
      width: 16px; height: 16px;
      transition: transform 200ms ease;
    }
    /* Collapsed: flip the chevron. */
    #bottomCard.collapsed #collapseBtn svg { transform: rotate(180deg); }
    #bottomCard.collapsed .cardBody,
    #bottomCard.collapsed .infoPanel { display: none; }

    #bottomCard .cardBody { margin-top: 4px; }
    #bottomCard .sub {
      margin: 2px 0 0; font-size: 0.82rem; color: var(--muted);
    }
    #bottomCard .altsHint {
      margin: 10px 0 6px; font-size: 0.72rem; color: var(--muted);
    }
    #bottomCard .alts {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    #bottomCard .alts a {
      width: 48px; height: 48px; border-radius: 6px; overflow: hidden;
      background: rgba(0,0,0,0.4);
      border: 1.5px solid transparent;
      display: block;
    }
    #bottomCard .alts a.current { border-color: rgba(255,255,255,0.85); }
    #bottomCard .alts img { width: 100%; height: 100%; object-fit: cover; display: block; }

    #bottomCard .infoPanel {
      margin-top: 12px; padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.12);
      color: var(--muted); font-size: 0.75rem; line-height: 1.45;
    }
    #bottomCard .infoPanel p { margin: 0; }
    #bottomCard .infoPanel b { color: var(--fg); font-weight: 600; }

    /* ---------- Centered action button (enable-location) ---------- */
    #centerBtn {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 30;
      pointer-events: none;
    }
    #centerBtn > button {
      pointer-events: auto;
      background: var(--bubble);
      border: 1px solid var(--bubble-border);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      color: var(--fg);
      padding: 14px 24px;
      border-radius: 999px;
      font-size: 1rem; font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    }
    #centerBtn > button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ---------- Desktop heading slider (hidden unless needed) ---------- */
    #desktopCtrl {
      position: fixed;
      left: 50px; right: 50px;
      bottom: calc(env(safe-area-inset-bottom, 0) + 20px);
      display: none;
      padding: 10px 14px;
      border-radius: 14px;
      z-index: 15;
    }
    #desktopCtrl label {
      color: var(--muted); font-size: 0.72rem;
      display: block; margin-bottom: 6px;
    }
    #desktopCtrl input { width: 100%; accent-color: #fff; }

    @media (max-width: 420px) {
      #bottomCard, #desktopCtrl { left: 16px; right: 16px; }
    }

    /* ---------- Minimap (circular, rotates with heading) ----------
       Sits top-right under the safe area. The map tiles inside rotate
       so the user's facing direction is always UP. The "N" badge on
       the ring moves to whatever angle true north is from the user's
       facing direction — same convention as Google Maps.
       Tap anywhere on it to manually override GPS (see app.js). */
    #miniMap {
      position: fixed;
      /* Aligned with the top pill — both sit at safe-area + 14 px so
         their top edges line up as a balanced header row. */
      top: calc(env(safe-area-inset-top, 0) + 14px);
      right: 14px;
      width: 110px; height: 110px;
      z-index: 15;
    }
    #miniMapGl {
      position: absolute; inset: 0;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,0.55);
      /* Soft vignette — the map fades out toward the edge so it feels
         like a porthole rather than a hard-edged disc. `closest-side` is
         important here: the default `farthest-corner` puts the gradient's
         100% outside the container, so only a tiny sliver of fade would
         actually be visible. */
      -webkit-mask-image: radial-gradient(circle closest-side, #000 55%, rgba(0,0,0,0.5) 85%, transparent 100%);
              mask-image: radial-gradient(circle closest-side, #000 55%, rgba(0,0,0,0.5) 85%, transparent 100%);
      cursor: pointer;
    }
    #miniMapGl canvas { border-radius: 50%; }
    /* MapLibre draws its own attribution/logos; we don't want them on a
       70px-wide porthole. Hide via CSS; credit stays in the about panel. */
    #miniMapGl .maplibregl-ctrl-attrib,
    #miniMapGl .maplibregl-ctrl-logo { display: none !important; }

    .miniMap-dot {
      position: absolute;
      top: 50%; left: 50%;
      width: 10px; height: 10px;
      margin: -5px 0 0 -5px;
      border-radius: 50%;
      background: #4a9fff;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.95), 0 0 8px rgba(74,159,255,0.5);
      pointer-events: none;
      z-index: 3;
    }
    .miniMap-cone {
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      margin-left: -7px;
      margin-top: -18px;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-bottom: 9px solid rgba(74,159,255,0.9);
      pointer-events: none;
      z-index: 2;
      filter: drop-shadow(0 0 3px rgba(74,159,255,0.4));
    }
    .miniMap-north {
      position: absolute;
      top: 50%; left: 50%;
      width: 18px; height: 18px;
      margin: -9px 0 0 -9px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      color: #000;
      font: 700 0.62rem/1 -apple-system, system-ui, sans-serif;
      letter-spacing: 0.3px;
      display: flex; align-items: center; justify-content: center;
      transition: transform 80ms linear;
      will-change: transform;
      pointer-events: none;
      box-shadow: 0 0 5px rgba(0,0,0,0.55);
      z-index: 3;
    }
    .miniMap-reset {
      position: absolute;
      top: 2px; left: 2px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(255,255,255,0.35);
      color: #fff;
      font-size: 0.72rem;
      line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 4;
      padding: 0;
    }
    .miniMap-reset:hover { background: rgba(0,0,0,0.85); }

    /* ---------- Contextual empty / loading text ----------
       Shown when the photo pane is empty — "Getting location…", "Point
       your phone at a building", "No 1940s photo in this direction".
       Hidden when a photo is visible. */
    #emptyHint {
      position: fixed;
      top: 45%; left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.8);
      font-size: 0.95rem;
      text-align: center;
      padding: 12px 20px;
      max-width: 82%;
      line-height: 1.4;
      pointer-events: none;
      z-index: 10;
      white-space: pre-line;
      text-shadow: 0 1px 10px rgba(0,0,0,0.9);
    }

    /* Tiny "manual location" chip shown in the bottom card when the user
       has tapped the minimap to correct their position. */
    .manualChip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.68rem; color: #fff;
      background: rgba(74,159,255,0.35);
      border: 1px solid rgba(74,159,255,0.7);
      padding: 2px 8px;
      border-radius: 999px;
      margin-left: 6px;
      cursor: pointer;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <!-- Full-width photo (or empty black when no candidate) -->
  <div id="photoWrap" class="empty"></div>

  <!-- Contextual text shown when the photo pane is empty (loading,
       no candidate, outside NYC, etc.). Hidden when a photo is up. -->
  <div id="emptyHint" hidden></div>

  <!-- Rotating circular minimap. Hidden until we have a first GPS fix
       AND MapLibre finishes loading. -->
  <div id="miniMap" hidden>
    <div id="miniMapGl"></div>
    <div class="miniMap-cone"></div>
    <div class="miniMap-dot"></div>
    <div class="miniMap-north" id="miniMapNorth">N</div>
    <button id="miniMapReset" class="miniMap-reset" hidden title="Reset to GPS location" aria-label="Reset to GPS">⌖</button>
  </div>

  <!-- Top pill: title only (compass moved to minimap). -->
  <div id="topPill" class="bubble">
    <span class="title">1940s Lens</span>
  </div>

  <!-- Bottom card: address + alternates (only when a hit is selected) -->
  <div id="bottomCard" class="bubble" hidden>
    <div class="cardHead">
      <p class="addr" id="addrText"></p>
      <div class="cardActions">
        <button id="infoBtn" class="iconBtn" aria-label="About this photo" title="About">i</button>
        <button id="collapseBtn" class="iconBtn" aria-label="Collapse" title="Collapse">
          <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="cardBody">
      <p class="sub" id="subText"></p>
      <p class="altsHint" id="altsHint" hidden></p>
      <div class="alts" id="altsStrip"></div>
    </div>
    <div class="infoPanel" id="infoPanel" hidden>
      <p>Photos courtesy of the <b>NYC Municipal Archives</b>, 1940s Tax Photographs collection. Placed on the map using NYC MapPLUTO.</p>
    </div>
  </div>

  <!-- Center enable-location button, only when we need a user gesture -->
  <div id="centerBtn">
    <button id="startBtn">Enable location</button>
  </div>

  <!-- Desktop-only heading slider (shown if no compass detected) -->
  <div id="desktopCtrl" class="bubble">
    <label id="desktopCtrlLabel">No compass — drag to change heading</label>
    <input type="range" id="headingSlider" min="0" max="359" value="0">
  </div>

  <!-- Portrait-only: shown on landscape phones as a CSS-only overlay. -->
  <div id="rotateHint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="7" y="3" width="10" height="18" rx="2" ry="2"/>
      <path d="M12 18h.01"/>
      <path d="M3 7a9 9 0 0 1 9-4"/>
      <polyline points="3 3 3 7 7 7"/>
    </svg>
    <p>Please rotate your phone to portrait</p>
  </div>

  <!-- MapLibre GL: loaded BEFORE app.js so it's globally available as
       `maplibregl` when the module runs. `defer` would also work but this
       app is small enough that a synchronous load is fine. -->
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
